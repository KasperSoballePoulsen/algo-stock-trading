services:
  postgres:
    image: postgres:17
    container_name: algo-trading-db
    ports:
      - "8001:5432"
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: algotrading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres-data: